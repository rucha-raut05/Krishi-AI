{% extends 'base.html' %}
{% block title %}History{% endblock %}
{% block body %}
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="fas fa-seedling"></i> <span>Krishi AI</span></div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
            <a href="/crop" class="nav-item"><i class="fas fa-seedling"></i><span>Crop Advisor</span></a>
            <a href="/fertilizer" class="nav-item"><i class="fas fa-flask"></i><span>Fertilizer</span></a>
            <a href="/disease" class="nav-item"><i class="fas fa-microscope"></i><span>Disease Detect</span></a>
            <a href="/weather" class="nav-item"><i class="fas fa-cloud-sun"></i><span>Weather</span></a>
            <a href="/chatbot" class="nav-item"><i class="fas fa-robot"></i><span>AI Chatbot</span></a>
            <a href="/history" class="nav-item active"><i class="fas fa-history"></i><span>History</span></a>
        </nav>
        <div class="sidebar-footer"><a href="#" onclick="logout()" class="nav-item"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></div>
    </aside>
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h1 class="page-title"><i class="fas fa-history"></i> My History</h1>
            <div class="user-info"><i class="fas fa-user-circle"></i></div>
        </header>
        <div class="content-area">
            <div class="history-filters">
                <button class="filter-btn active" onclick="filterHistory('all',this)">All</button>
                <button class="filter-btn" onclick="filterHistory('crop',this)">🌱 Crop</button>
                <button class="filter-btn" onclick="filterHistory('fertilizer',this)">🧪 Fertilizer</button>
                <button class="filter-btn" onclick="filterHistory('disease',this)">🔬 Disease</button>
                <button class="filter-btn" onclick="filterHistory('chatbot',this)">🤖 Chatbot</button>
            </div>
            <div id="history-list" class="history-list"></div>
            <div id="history-empty" class="empty-state" style="display:none">
                <i class="fas fa-inbox"></i><h3>No history yet</h3><p>Your past queries will appear here.</p>
            </div>
        </div>
    </main>
</div>
<script>
let allHistory=[];
async function loadHistory(type='all'){
    try{const res=await fetch(`/api/history?type=${type}`);allHistory=await res.json();renderHistory();}
    catch(e){showToast('Failed to load history','error');}
}
function renderHistory(){
    const list=document.getElementById('history-list');const empty=document.getElementById('history-empty');
    if(!allHistory.length){list.innerHTML='';empty.style.display='flex';return;}
    empty.style.display='none';
    const icons={crop:'🌱',fertilizer:'🧪',disease:'🔬',chatbot:'🤖',weather:'🌤️'};
    const colors={crop:'#2ecc71',fertilizer:'#3498db',disease:'#e74c3c',chatbot:'#9b59b6',weather:'#f39c12'};
    list.innerHTML=allHistory.map(h=>{
        const d=new Date(h.date).toLocaleDateString('en',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
        let summary='';
        if(h.type==='crop')summary=`Recommended: <strong>${h.result.crop||'N/A'}</strong>`;
        else if(h.type==='fertilizer')summary=`Recommended: <strong>${h.result.fertilizer||'N/A'}</strong>`;
        else if(h.type==='disease')summary=`Detected: <strong>${h.result.disease||'N/A'}</strong>`;
        else if(h.type==='chatbot')summary=`Q: ${h.input.message||''}`;
        return `<div class="history-card" style="--accent:${colors[h.type]||'#666'}">
            <div class="history-icon">${icons[h.type]||'📝'}</div>
            <div class="history-info"><div class="history-type">${h.type.toUpperCase()}</div><div class="history-summary">${summary}</div><div class="history-date">${d}</div></div>
            <button class="btn-icon" onclick="deleteHistory(${h.id})" title="Delete"><i class="fas fa-trash"></i></button>
        </div>`;
    }).join('');
}
function filterHistory(type,btn){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadHistory(type);
}
async function deleteHistory(id){
    if(!confirm('Delete this entry?'))return;
    try{await fetch(`/api/history/${id}`,{method:'DELETE'});allHistory=allHistory.filter(h=>h.id!==id);renderHistory();showToast('Deleted','success');}
    catch(e){showToast('Failed to delete','error');}
}
loadHistory();
</script>
{% endblock %}
